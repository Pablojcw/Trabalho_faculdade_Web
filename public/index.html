<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/style/style.css">
    <script src="../src/javaScript/script.js"></script>
    
    <title>Document</title>
</head>



<body>

    <div class="hoot">
        <h1>Trabalho Faculdade Programação Web</h1>
    </div>

    <div class="pesquisa">
        <h3>BUSCAR</h3>
        <input type="text" id="txtBusca" placeholder="Buscar..." />
        <button onclick="buscarTarefas()">Buscar</button>
    </div>

    <div class="container">
        <input type="text" id="titulo" placeholder="Titulo" />
        <input type="text" id="descricao" placeholder="Descrição da tarefa" />
        <input type="date" id="data" name="data">

        <div class="escolhas">
            <select id="SLA" name="SLA">
                <option value="baixo">baixo</option>
                <option value="medio">medio</option>
                <option value="alto">alto</option>
            </select>

            <select id="status" name="status">
                <option value="pendente">pendente</option>
                <option value="concluido">concluido</option>

            </select>

        </div>

        <div class="Button-salvar">
            <button type="button" id="btn-salvar" onclick="salvarTarefa()">Salvar</button>
        </div>
    </div>

    <section class="tarefas-section">
        <h2>Minhas Tarefas</h2>
        <button id="lista-tarefas" class="lista-grid" onclick="listarTarefas()">
            listar tarefas
        </button>
    </section>

</body>

</html>
